# Prefer this when Coolify build pack = Nixpacks.
# Better: set build pack to Dockerfile (repo root Dockerfile).

[phases.setup]
nixPkgs = ["nodejs_22", "npm-9_x"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm run start"

[variables]
PORT = "3000"
DATA_DIR = "/data"
HOSTNAME = "0.0.0.0"
NEXT_TELEMETRY_DISABLED = "1"
